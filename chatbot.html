<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Chat Bot</title>

  <link rel="stylesheet" href="https://ajax.googleapis.com/ajax/libs/jquerymobile/1.4.5/jquery.mobile.min.css" />
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/jquerymobile/1.4.5/jquery.mobile.min.js"></script>

  <style>
    .ui-header {
      background-color: blue !important;
      border-color: blue !important;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .ui-header h1 {
      color: white !important;
      font-size: 22px;
      margin: 0;
    }
    .ui-footer {
      background-color: blue !important;
      border-color: blue !important;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .ui-footer h4 {
      color: white !important;
      font-size: 13px;
      margin: 0;
    }
    .ui-content {
      padding: 15px;
      text-align: center;
      background: whitesmoke;
      min-height: calc(100vh - 120px);
      box-sizing: border-box;
    }
    #idAsistente {
      font-size: 60px;
      margin: 10px 0 0;
      animation: flotar 2s ease-in-out infinite;
    }
    @keyframes flotar {
      0%   { transform: translateY(0px); }
      50%  { transform: translateY(-8px); }
      100% { transform: translateY(0px); }
    }
    #idBurbuja {
      background: white;
      border-radius: 16px;
      padding: 12px 16px;
      margin: 8px auto;
      max-width: 90%;
      font-size: 16px;
      color: black;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      min-height: 40px;
    }
    #colorear {
      height: 300px;
      background-color: blue;
      border-radius: 12px;
      margin: 10px auto;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: bold;
      color: white;
      transition: background 0.5s ease;
    }
    #idAreaChat {
      background: teal;
      border-radius: 12px;
      padding: 12px;
      margin-top: 10px;
    }
    #idAreaChat h3 {
      color: white;
      margin: 0 0 8px;
      font-size: 16px;
    }
    #idUsuario {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
      margin-bottom: 8px;
      box-sizing: border-box;
    }
    .btn-fila {
      display: flex;
      gap: 8px;
      justify-content: center;
    }
    .btn-fila button {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: white;
      color: teal;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      flex: 1;
    }
  </style>
</head>
<body>

  <div data-role="page" id="inicio">

    <div data-role="header" data-theme="b">
      <h1>Mi Chat Bot</h1>
    </div>

    <div data-role="content">

      <div id="idAsistente">🧞</div>
      <div id="idBurbuja">Hola. Soy tu asistente.</div>

      <div id="colorear">Agitame</div>

      <div id="idAreaChat">
        <h3>¿Qué querés decir?</h3>
        <input type="search" id="idUsuario" placeholder="Escribí acá" />
        <div class="btn-fila">
          <button id="idBotonIr">Buscar</button>
          <button id="idBotonMic">🎤 Hablar</button>
        </div>
      </div>

    </div>

    <div data-role="footer" data-theme="b">
      <h4>Mi Chat Bot 2026</h4>
    </div>

  </div>

  <script>

    // AGITADOR - solo cambia color, no muestra nada en la burbuja
    function fnAgitador() {
      console.log("Agitado");
      var colores = ["lightgreen", "blue", "violet"];
      var color = colores[Math.floor(Math.random() * colores.length)];
      var colorear = document.getElementById("colorear");

      colorear.style.background = color;
      colorear.innerText = color.toUpperCase();

      setTimeout(function () {
        colorear.style.background = "blue";
        colorear.innerText = "Agitame";
      }, 3000);
    }

    // RECIBE TEXTO DESDE APP INVENTOR
    function fnTextoDesdeApp(texto) {
      console.log("Desde App Inventor: " + texto);
      document.getElementById("idUsuario").value = texto;

      var colorear = document.getElementById("colorear");
      colorear.style.background = "violet";
      colorear.innerText = "Escuchando...";

      fnResponder(texto);

      setTimeout(function () {
        colorear.style.background = "blue";
        colorear.innerText = "Agitame";
      }, 3000);
    }

    // RESPUESTAS DEL ASISTENTE
    function fnResponder(texto) {
      texto = texto.toLowerCase().trim();
      var respuesta = "";
      var ahora = new Date();

      if (texto.indexOf("hola") >= 0 || texto.indexOf("buenos") >= 0 || texto.indexOf("buen") >= 0) {
        var hora = ahora.getHours();
        if (hora >= 6 && hora < 12) {
          respuesta = "Buenos días. ¿En qué te ayudo?";
        } else if (hora >= 12 && hora < 18) {
          respuesta = "Buenas tardes. ¿En qué te ayudo?";
        } else {
          respuesta = "Buenas noches. ¿En qué te ayudo?";
        }

      } else if (texto.indexOf("hora") >= 0) {
        var h = ahora.getHours();
        var m = ahora.getMinutes().toString().padStart(2, "0");
        respuesta = "Son las " + h + ":" + m;

      } else if (texto.indexOf("fecha") >= 0 || texto.indexOf("dia") >= 0 ||
                 texto.indexOf("día") >= 0 || texto.indexOf("hoy") >= 0) {
        var dias  = ["domingo","lunes","martes","miércoles","jueves","viernes","sábado"];
        var meses = ["enero","febrero","marzo","abril","mayo","junio",
                     "julio","agosto","septiembre","octubre","noviembre","diciembre"];
        respuesta = "Hoy es " + dias[ahora.getDay()] + " " +
                    ahora.getDate() + " de " + meses[ahora.getMonth()] +
                    " de " + ahora.getFullYear();

      } else if (texto.indexOf("como estas") >= 0 || texto.indexOf("cómo estás") >= 0) {
        respuesta = "Estoy bien. Listo para ayudarte.";

      } else if (texto.indexOf("nombre") >= 0 || texto.indexOf("quien eres") >= 0 ||
                 texto.indexOf("quién eres") >= 0) {
        respuesta = "Soy tu asistente.";

      } else if (texto.indexOf("gracias") >= 0) {
        respuesta = "Un placer.";

      } else if (texto.indexOf("chiste") >= 0) {
        var chistes = [
          "¿Por qué los pájaros vuelan hacia el sur? Porque es muy lejos para caminar.",
          "¿Qué le dice un techo a otro techo? Techo de menos.",
          "¿Por qué el libro de matemáticas estaba triste? Tenía demasiados problemas."
        ];
        respuesta = chistes[Math.floor(Math.random() * chistes.length)];

      } else {
        respuesta = "Buscando " + texto + " en Google...";
        document.getElementById("idBurbuja").innerText = respuesta;
        fnHablar("Buscando " + texto + " en Google");
        setTimeout(function () {
          window.location.href = "https://www.google.com/search?q=" +
                                  encodeURIComponent(texto);
        }, 1200);
        return;
      }

      document.getElementById("idBurbuja").innerText = respuesta;
      fnHablar(respuesta);
    }

    // VOZ SINTETIZADA
    function fnHablar(texto) {
      if ("speechSynthesis" in window) {
        window.speechSynthesis.cancel();
        var utterance = new SpeechSynthesisUtterance(texto);
        utterance.lang = "es-AR";
        utterance.rate = 1;
        window.speechSynthesis.speak(utterance);
      }
    }

    // BOTÓN BUSCAR
    document.getElementById("idBotonIr").addEventListener("click", function () {
      var texto = document.getElementById("idUsuario").value.trim();
      if (texto == "") {
        document.getElementById("idBurbuja").innerText = "Escribí algo.";
        return;
      }
      fnResponder(texto);
    });

    // Enter en input
    document.getElementById("idUsuario").addEventListener("keypress", function(e) {
      if (e.key === "Enter") {
        var texto = document.getElementById("idUsuario").value.trim();
        if (texto !== "") fnResponder(texto);
      }
    });

    // BOTÓN HABLAR
    document.getElementById("idBotonMic").addEventListener("click", function () {
      document.getElementById("idBurbuja").innerText = "Presioná el botón micrófono de la app.";
      document.getElementById("colorear").style.background = "lightgreen";
      document.getElementById("colorear").innerText = "Esperando...";
      setTimeout(function() {
        document.getElementById("colorear").style.background = "blue";
        document.getElementById("colorear").innerText = "Agitame";
      }, 3000);
    });

    // SALUDO INICIAL
    window.addEventListener("load", function () {
      setTimeout(function () {
        document.getElementById("idBurbuja").innerText =
          "Hola. Soy tu asistente. ¿En qué te ayudo?";
        fnHablar("Hola. Soy tu asistente. ¿En qué te ayudo?");
      }, 1000);
    });

  </script>

</body>
</html>

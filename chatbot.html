<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Chat Bot</title>

  <link rel="stylesheet" href="https://ajax.googleapis.com/ajax/libs/jquerymobile/1.4.5/jquery.mobile.min.css" />
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/jquerymobile/1.4.5/jquery.mobile.min.js"></script>

  <style>
    .ui-header {
      background-color: #0077cc !important;
      border-color: #005fa3 !important;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .ui-header h1 {
      color: #ffffff !important;
      font-size: 22px;
      margin: 0;
    }
    .ui-header .ui-btn-left {
      position: absolute;
      left: 10px;
      top: 10px;
      background: white !important;
      color: #0077cc !important;
      border: none !important;
      border-radius: 8px !important;
      font-weight: bold;
    }
    .ui-footer {
      background-color: #0077cc !important;
      border-color: #005fa3 !important;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }
    .ui-footer h4 {
      color: #ffffff !important;
      font-size: 13px;
      margin: 0;
    }
    .ui-content {
      padding: 15px;
      text-align: center;
      background: #f5f5f5;
      min-height: calc(100vh - 120px);
      box-sizing: border-box;
    }
    #idAsistente {
      font-size: 60px;
      margin: 10px 0 0;
      animation: flotar 2s ease-in-out infinite;
    }
    @keyframes flotar {
      0%   { transform: translateY(0px); }
      50%  { transform: translateY(-8px); }
      100% { transform: translateY(0px); }
    }
    #idBurbuja {
      background: white;
      border-radius: 16px;
      padding: 12px 16px;
      margin: 8px auto;
      max-width: 90%;
      font-size: 16px;
      color: #333;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      min-height: 40px;
    }

    /* ✅ id="colorear" con height 300px como pide el profesor */
    #colorear {
      height: 300px;
      background-color: #0077cc;
      border-radius: 12px;
      margin: 10px auto;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: bold;
      color: white;
      transition: background 0.5s ease;
    }

    #idAreaChat {
      background: teal;
      border-radius: 12px;
      padding: 12px;
      margin-top: 10px;
    }
    #idAreaChat h3 {
      color: white;
      margin: 0 0 8px;
      font-size: 16px;
    }
    #idUsuario {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
      margin-bottom: 8px;
      box-sizing: border-box;
    }
    .btn-fila {
      display: flex;
      gap: 8px;
      justify-content: center;
    }
    .btn-fila button {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: white;
      color: teal;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      flex: 1;
    }
  </style>
</head>
<body>

  <div data-role="page" id="inicio">

    <div data-role="header" data-theme="b">
      <a href="#" onclick="fnVolver()" 
         class="ui-btn ui-btn-left ui-btn-inline ui-mini">← Volver</a>
      <h1>✨ Mi Chat Bot</h1>
    </div>

    <div data-role="content">

      <div id="idAsistente">🧞</div>
      <div id="idBurbuja">¡Hola! Soy tu asistente. Agitá el teléfono o usá el micrófono.</div>

      <!-- ✅ id="colorear" con style.background como pide el profesor -->
      <div id="colorear">🤳 ¡Agitame!</div>

      <div id="idAreaChat">
        <h3>🔍 ¿Qué querés buscar?</h3>
        <input type="search" id="idUsuario" 
               placeholder="Escribí sin necesidad de http://" />
        <div class="btn-fila">
          <button id="idBotonIr">🔎 Buscar</button>
          <button id="idBotonMic">🎤 Hablar</button>
        </div>
      </div>

    </div>

    <div data-role="footer" data-theme="b">
      <h4>Mi Chat Bot 2026</h4>
    </div>

  </div>

  <script>

    // =========================
    // RESPUESTAS DEL ASISTENTE
    // =========================
    function fnResponder(texto) {
      texto = texto.toLowerCase().trim();
      var respuesta = "";
      var ahora = new Date();

      if (texto.includes("hola") || texto.includes("buenos") || texto.includes("buen")) {
        var hora = ahora.getHours();
        if (hora >= 6 && hora < 12) {
          respuesta = "¡Buenos días! ☀️ ¿En qué te ayudo?";
        } else if (hora >= 12 && hora < 18) {
          respuesta = "¡Buenas tardes! 🌤️ ¿En qué te ayudo?";
        } else {
          respuesta = "¡Buenas noches! 🌙 ¿En qué te ayudo?";
        }

      } else if (texto.includes("hora")) {
        var h = ahora.getHours();
        var m = ahora.getMinutes().toString().padStart(2, "0");
        respuesta = "⏰ Son las " + h + ":" + m + " hs";

      } else if (texto.includes("fecha") || texto.includes("dia") || 
                 texto.includes("día") || texto.includes("hoy")) {
        var dias  = ["domingo","lunes","martes","miércoles","jueves","viernes","sábado"];
        var meses = ["enero","febrero","marzo","abril","mayo","junio",
                     "julio","agosto","septiembre","octubre","noviembre","diciembre"];
        respuesta = "📅 Hoy es " + dias[ahora.getDay()] + " " + 
                    ahora.getDate() + " de " + meses[ahora.getMonth()] + 
                    " de " + ahora.getFullYear();

      } else if (texto.includes("como estas") || texto.includes("cómo estás") || 
                 texto.includes("como te va")) {
        respuesta = "¡Muy bien gracias! 😊 Listo para ayudarte.";

      } else if (texto.includes("nombre") || texto.includes("quien eres") || 
                 texto.includes("quién eres")) {
        respuesta = "Soy tu asistente 🧞 ¡Preguntame lo que quieras!";

      } else if (texto.includes("gracias")) {
        respuesta = "¡De nada! 😄 Para eso estoy.";

      } else if (texto.includes("chiste")) {
        var chistes = [
          "¿Por qué los pájaros vuelan hacia el sur? Porque es muy lejos para caminar 😂",
          "¿Qué le dice un techo a otro techo? Techo de menos 😄",
          "¿Por qué el libro de matemáticas estaba triste? Tenía demasiados problemas 😅"
        ];
        respuesta = chistes[Math.floor(Math.random() * chistes.length)];

      } else {
        respuesta = "Buscando \"" + texto + "\" en Google... 🔍";
        document.getElementById("idBurbuja").innerText = respuesta;
        fnHablar("Buscando " + texto + " en Google");
        setTimeout(function() {
          window.location.href = "https://www.google.com/search?q=" + 
                                  encodeURIComponent(texto);
        }, 1200);
        return;
      }

      document.getElementById("idBurbuja").innerText = respuesta;
      fnHablar(respuesta);
    }

    // =========================
    // VOZ SINTETIZADA
    // =========================
    function fnHablar(texto) {
      if ("speechSynthesis" in window) {
        window.speechSynthesis.cancel();
        var utterance = new SpeechSynthesisUtterance(texto);
        utterance.lang = "es-AR";
        utterance.rate = 1;
        window.speechSynthesis.speak(utterance);
      }
    }

    // =========================
    // BOTÓN BUSCAR
    // =========================
    document.getElementById("idBotonIr").addEventListener("click", function () {
      var texto = document.getElementById("idUsuario").value.trim();
      if (texto === "") {
        document.getElementById("idBurbuja").innerText = "Escribí algo para buscar.";
        return;
      }
      fnResponder(texto);
    });

    // Enter en el input
    document.getElementById("idUsuario").addEventListener("keypress", function(e) {
      if (e.key === "Enter") {
        var texto = document.getElementById("idUsuario").value.trim();
        if (texto !== "") fnResponder(texto);
      }
    });

    // =========================
    // BOTÓN MICRÓFONO
    // =========================
    document.getElementById("idBotonMic").addEventListener("click", function () {
      fnEscuchar();
    });

    // =========================
    // FUNCIÓN ESCUCHAR
    // =========================
    function fnEscuchar(colorEscucha) {
      var colorear = document.getElementById("colorear");
      var burbuja  = document.getElementById("idBurbuja");
      var SR = window.SpeechRecognition || window.webkitSpeechRecognition;

      if (!SR) {
        burbuja.innerText = "🎤 Este navegador no permite el micrófono. Escribí tu consulta.";
        colorear.style.background = "#e91e63";
        colorear.innerText = "⌨️ Escribí abajo";
        setTimeout(function() {
          colorear.style.background = "#0077cc";
          colorear.innerText = "🤳 ¡Agitame!";
        }, 3000);
        return;
      }

      var recognition = new SR();
      recognition.lang = "es-AR";
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;

      burbuja.innerText = "🎤 Escuchando...";

      // ✅ colorear.style.background como pide el profesor
      colorear.style.background = colorEscucha || "#9c27b0";
      colorear.innerText = "🎤 Escuchando...";

      recognition.onresult = function (event) {
        var texto = event.results[0][0].transcript;
        console.log("Escuché: " + texto);
        document.getElementById("idUsuario").value = texto;
        fnResponder(texto);
        colorear.style.background = "#0077cc";
        colorear.innerText = "🤳 ¡Agitame!";
      };

      recognition.onerror = function (event) {
        console.log("Error mic: " + event.error);
        if (event.error === "not-allowed") {
          burbuja.innerText = "No diste permiso al micrófono.";
        } else if (event.error === "no-speech") {
          burbuja.innerText = "No escuché ninguna voz. Intentá de nuevo.";
        } else if (event.error === "audio-capture") {
          burbuja.innerText = "No se encontró micrófono en el dispositivo.";
        } else if (event.error === "network") {
          burbuja.innerText = "Problema de red con el micrófono.";
        } else {
          burbuja.innerText = "No te escuché bien. Intentá de nuevo.";
        }
        colorear.style.background = "#0077cc";
        colorear.innerText = "🤳 ¡Agitame!";
      };

      recognition.onend = function() {
        colorear.style.background = "#0077cc";
        colorear.innerText = "🤳 ¡Agitame!";
      };

      try {
        recognition.start();
      } catch (e) {
        burbuja.innerText = "Error al iniciar el micrófono.";
        colorear.style.background = "#0077cc";
        colorear.innerText = "🤳 ¡Agitame!";
      }
    }

    // =========================
    // AGITADOR DESDE APP INVENTOR
    // En App Inventor el bloque debe decir:
    // call WebViewer1.GoToUrl url "javascript:fnAgitador()"
    // =========================
    function fnAgitador() {
      console.log("Teléfono agitado");

      var colores = ["#e91e63", "#9c27b0", "#ff5722", "#4caf50", "#ff9800"];
      var color   = colores[Math.floor(Math.random() * colores.length)];

      var colorear = document.getElementById("colorear");
      var burbuja  = document.getElementById("idBurbuja");

      // ✅ colorear.style.background = color como pide el profesor
      colorear.style.background = color;
      colorear.innerText = "🎤 Escuchando...";
      burbuja.innerText  = "🎤 Te escucho...";

      fnEscuchar(color);
    }

    // =========================
    // APP INVENTOR ENVÍA TEXTO
    // Si usás SpeechRecognizer nativo de App Inventor:
    // call WebViewer1.GoToUrl url "javascript:fnTextoDesdeApp('" & result & "')"
    // =========================
    function fnTextoDesdeApp(texto) {
      document.getElementById("idUsuario").value = texto;
      fnResponder(texto);
    }

    // =========================
    // BOTÓN VOLVER
    // =========================
    function fnVolver() {
      if (window.location.href.indexOf("google.com") !== -1) {
        window.location.href = "#inicio";
      } else if (history.length > 1) {
        history.back();
      } else {
        window.location.href = "#inicio";
      }
    }

    // =========================
    // SALUDO INICIAL
    // =========================
    window.addEventListener("load", function () {
      setTimeout(function () {
        var hora = new Date().getHours();
        var saludo = hora < 12 ? "¡Buenos días! ☀️" : 
                     hora < 18 ? "¡Buenas tardes! 🌤️" : "¡Buenas noches! 🌙";
        var msg = saludo + " Soy tu asistente 🧞 ¿En qué te ayudo?";
        document.getElementById("idBurbuja").innerText = msg;
        fnHablar(saludo + " Soy tu asistente. ¿En qué te ayudo?");
      }, 1000);
    });

  </script>

</body>
</html>

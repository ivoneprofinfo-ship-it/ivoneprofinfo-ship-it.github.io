<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi App</title>
  <link rel="stylesheet" href="https://ajax.googleapis.com/ajax/libs/jquerymobile/1.4.5/jquery.mobile.min.css" />
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/jquerymobile/1.4.5/jquery.mobile.min.js"></script>

  <style>
    .ui-header {
      background-color: #0077cc !important;
      border-color: #005fa3 !important;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .ui-header h1 {
      color: #ffffff !important;
      font-size: 20px;
      line-height: 60px;
    }
    .ui-footer {
      background-color: #0077cc !important;
      border-color: #005fa3 !important;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }
    .ui-footer h4 {
      color: #ffffff !important;
      font-size: 14px;
      margin: 0;
    }
    .ui-content {
      padding: 20px;
      text-align: center;
    }

    #idAreaChat {
      background: teal;
      border-radius: 10px;
      padding: 15px;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
      margin-bottom: 15px;
    }
    #idAreaChat h2 {
      color: white;
      margin-top: 0;
    }
    #idUsuario {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
      margin-bottom: 10px;
      box-sizing: border-box;
    }
    .btn-fila {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn-fila button {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      background: white;
      color: teal;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }
    .btn-fila button:active {
      background: #e0e0e0;
    }

    #colorear {
      height: 300px;
      background-color: #eeeeee;
      border: 1px solid #ccc;
      border-radius: 8px;
      margin-top: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: bold;
      color: #333;
      transition: background 0.4s ease;
    }

    #idAreaMensaje {
      margin-top: 10px;
      padding: 10px;
      font-size: 16px;
      color: #333;
      min-height: 30px;
      background: #f0f0f0;
      border-radius: 8px;
    }

    #btnVolver {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: white;
      color: #0077cc;
      font-size: 22px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div data-role="page" id="inicio">

    <div data-role="header" data-theme="b">
      <h1>Mi ChatBot</h1>
    </div>

    <div data-role="content">

      <!-- Área de búsqueda -->
      <div id="idAreaChat">
        <h2>🔍 Buscador</h2>
        <input type="search" id="idUsuario" placeholder="Escribí una palabra o URL..." />
        <div class="btn-fila">
          <button id="idBotonIr">🔎 IR</button>
          <button id="idBotonMic">🎤 Mic</button>
        </div>
      </div>

      <!-- Mensaje reconocimiento de voz -->
      <div id="idAreaMensaje">Agitá para escuchar o escribí algo...</div>

      <!-- Caja que cambia de color al agitar -->
      <div id="colorear">¡Agitame!</div>

    </div>

    <div data-role="footer" data-theme="b">
      <button id="btnVolver" onclick="fnVolver()">← Volver</button>
      <h4>Mi ChatBot</h4>
    </div>

  </div>

  <script>
    // ========== BUSCADOR ==========
    document.getElementById("idBotonIr").onclick = function () {
      fnBuscar();
    };

    function fnBuscar() {
      var texto = document.getElementById("idUsuario").value.trim();
      if (texto === "") return;

      var url;
      if (texto.startsWith("http://") || texto.startsWith("https://")) {
        url = texto;
      } else {
        url = "https://www.google.com/search?q=" + encodeURIComponent(texto);
      }
      window.location.href = url;
    }

    // ========== MICROFONO ==========
    document.getElementById("idBotonMic").onclick = function () {
      fnEscuchar();
    };

    function fnEscuchar() {
      if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        document.getElementById("idAreaMensaje").innerText = "Tu navegador no soporta el micrófono.";
        return;
      }

      var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      var recognition = new SpeechRecognition();
      recognition.lang = "es-AR";
      recognition.interimResults = false;

      document.getElementById("idAreaMensaje").innerText = "🎤 Escuchando...";

      recognition.onresult = function (event) {
        var texto = event.results[0][0].transcript;
        console.log("Escuché: " + texto);
        document.getElementById("idUsuario").value = texto;
        document.getElementById("idAreaMensaje").innerText = "Escuché: " + texto;
        fnBuscar();
      };

      recognition.onerror = function (event) {
        document.getElementById("idAreaMensaje").innerText = "Error al escuchar: " + event.error;
      };

      recognition.start();
    }

    // ========== AGITADOR ==========
    function fnAgitador() {
      console.log("El teléfono fue agitado");

      var _random = Math.random() * 3;
      var _colores = ["red", "fuchsia", "blue"];
      var _color = _colores[parseInt(_random)];

      var colorear = document.getElementById("colorear");
      colorear.style.background = _color;
      colorear.innerHTML = "🎤 Escuchando...";

      // Activa el micrófono al agitar
      fnEscuchar();

      setTimeout(function () {
        colorear.style.background = "#eeeeee";
        colorear.innerHTML = "¡Agitame!";
      }, 4000);
    }

    // ========== BOTON VOLVER ==========
    function fnVolver() {
      if (history.length > 1) {
        history.back();
      } else {
        window.location.href = "about:blank";
      }
    }
  </script>

</body>
</html>

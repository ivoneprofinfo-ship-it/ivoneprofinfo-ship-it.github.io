<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Semáforo</title>
  <link href="https://cdn.simplecss.org/simple.css" rel="stylesheet"/>
  <link rel="icon" href="\Semaforo\logo.png"/>
  <style>
    body {
      background-image: linear-gradient(45deg, black, skyblue);
    }

    svg {
      display: block;
      margin: 0 auto;
    }
  </style>
</head>
<body>

<header>
  <h1>Semáforo</h1>
  <button id="idBotonReiniciar">Actualizar</button>
  <button id="idBotonActivarSemaforo">Activar semáforo</button>
  <button id="idBotonDetenerSemaforo">Detener</button>
</header>

<main>
  <svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
    <g id="Layer_1">
      <title>Layer 1</title>
      <!-- Cuerpo del semáforo -->
      <ellipse ry="205.5" rx="146" cy="299.5" cx="350" stroke="black" fill="plum"/>
      <!-- Luz ROJA (arriba) -->
      <ellipse id="idEstrella" ry="46.5" rx="70.5" cy="207.5" cx="347.5" stroke="black" fill="lightcoral"/>
      <!-- Luz AMARILLA (medio) -->
      <ellipse id="idCirculo" ry="46.5" rx="70.5" cy="329.5" cx="351.5" stroke="black" fill="lightyellow"/>
      <!-- Luz VERDE (abajo) -->
      <ellipse id="idCorazon" ry="46.5" rx="70.5" cy="439.5" cx="352.5" stroke="black" fill="lightgreen"/>
    </g>
  </svg>
</main>

<footer>
  <h3>&copy; 2025 — Gabriela Roldan</h3>
</footer>

<script>
  var _timer = null;

  // ===== BOTONES =====
  idBotonReiniciar.onclick       = fnApagarLuces;
  idBotonActivarSemaforo.onclick = fnComenzar;
  idBotonDetenerSemaforo.onclick = fnDetener;

  // ===== COMENZAR: arranca en ROJO =====
  function fnComenzar()
  {
    fnDetener();      // cancela cualquier timer anterior
    fnARojo1();       // arranca el ciclo
  }

  // ===== DETENER =====
  function fnDetener()
  {
    clearTimeout(_timer);
    _timer = null;
  }

  // ===== APAGAR TODAS LAS LUCES =====
  function fnApagarLuces()
  {
    fnDetener();
    idEstrella.style.fill = "lightcoral";
    idCirculo.style.fill  = "lightyellow";
    idCorazon.style.fill  = "lightgreen";
  }

  function fnARojo1()
  {
    idEstrella.style.fill = "lightcoral";
    idCirculo.style.fill  = "lightyellow";
    idCorazon.style.fill  = "lightgreen";

    idEstrella.style.fill = "red";
    _timer = setTimeout(fnAAmarillo1, 3000);
  }

  function fnAAmarillo1()
  {
    idEstrella.style.fill = "lightcoral";
    idCirculo.style.fill  = "lightyellow";
    idCorazon.style.fill  = "lightgreen";

    idCirculo.style.fill = "yellow";
    _timer = setTimeout(fnAVerde1, 1000);
  }

  function fnAVerde1()
  {
    idEstrella.style.fill = "lightcoral";
    idCirculo.style.fill  = "lightyellow";
    idCorazon.style.fill  = "lightgreen";

    idCorazon.style.fill = "green";
    _timer = setTimeout(fnAAmarillo2, 3000);
  }

  function fnAAmarillo2()
  {
    idEstrella.style.fill = "lightcoral";
    idCirculo.style.fill  = "lightyellow";
    idCorazon.style.fill  = "lightgreen";

    idCirculo.style.fill = "yellow";
    _timer = setTimeout(fnARojo1, 1000);
  }

  // <!-- ============================================================
  //      Trabajo realizado por Gabriela Roldan
  //      Disenio de Sistemas - 2025
  //      ============================================================ -->
</script>

</body>
</html>

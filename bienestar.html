
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bienestar Estudiantil</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --azul-profundo: #1A3FC4;
    --azul-cielo: #2EBDE5;
    --azul-cian: #00C2E0;
    --dorado: #FFB800;
    --azul-oscuro: #0D2080;
    --blanco: #FFFFFF;
    --gris-claro: #F4F7FF;
    --gris-texto: #3A4060;
    --sombra: rgba(26,63,196,0.15);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--gris-claro);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Fondo animado ── */
  body::before {
    content:'';
    position:fixed;
    inset:0;
    background:
      radial-gradient(ellipse 80% 50% at 10% 20%, rgba(46,189,229,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 90% 80%, rgba(26,63,196,0.10) 0%, transparent 55%),
      radial-gradient(ellipse 40% 30% at 60% 10%, rgba(0,194,224,0.08) 0%, transparent 50%);
    pointer-events:none;
    z-index:0;
  }

  /* ── Header ── */
  header {
    position:relative;
    z-index:10;
    background: linear-gradient(135deg, var(--azul-oscuro) 0%, var(--azul-profundo) 60%, var(--azul-cielo) 100%);
    padding: 28px 40px 24px;
    display:flex;
    align-items:center;
    gap:20px;
    box-shadow: 0 4px 30px rgba(13,32,128,0.35);
  }

  header .logo {
    width:56px; height:56px;
    flex-shrink:0;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
  }

  header .titles h1 {
    font-family:'Sora', sans-serif;
    font-weight:800;
    font-size:1.45rem;
    color: var(--blanco);
    letter-spacing:-0.02em;
    line-height:1.2;
  }

  header .titles p {
    font-size:0.82rem;
    color:rgba(255,255,255,0.72);
    font-weight:300;
    letter-spacing:0.04em;
    margin-top:3px;
    text-transform:uppercase;
  }

  header .badge {
    margin-left:auto;
    background:rgba(255,184,0,0.18);
    border:1px solid rgba(255,184,0,0.5);
    color: var(--dorado);
    font-family:'Sora', sans-serif;
    font-size:0.72rem;
    font-weight:700;
    padding:5px 12px;
    border-radius:20px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    white-space:nowrap;
  }

  /* ── Main wrapper ── */
  main {
    position:relative;
    z-index:5;
    max-width:720px;
    margin:0 auto;
    padding:40px 24px 60px;
  }

  /* ── Progress bar ── */
  .progress-area {
    margin-bottom:32px;
  }

  .progress-info {
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
  }

  .progress-info .step-label {
    font-family:'Sora', sans-serif;
    font-size:0.78rem;
    font-weight:700;
    color:var(--azul-profundo);
    text-transform:uppercase;
    letter-spacing:0.08em;
  }

  .progress-info .step-count {
    font-size:0.78rem;
    color:var(--gris-texto);
    font-weight:400;
  }

  .progress-track {
    height:6px;
    background:rgba(26,63,196,0.12);
    border-radius:10px;
    overflow:hidden;
  }

  .progress-fill {
    height:100%;
    background: linear-gradient(90deg, var(--azul-profundo), var(--azul-cian));
    border-radius:10px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  }

  /* ── Card ── */
  .card {
    background: var(--blanco);
    border-radius:24px;
    padding:40px 44px;
    box-shadow: 0 8px 40px var(--sombra), 0 1px 0 rgba(255,255,255,0.8) inset;
    animation: cardIn 0.45s cubic-bezier(0.4,0,0.2,1) both;
  }

  @keyframes cardIn {
    from { opacity:0; transform:translateY(24px) scale(0.98); }
    to   { opacity:1; transform:translateY(0) scale(1); }
  }

  .card-icon {
    width:52px; height:52px;
    border-radius:16px;
    display:flex; align-items:center; justify-content:center;
    font-size:1.6rem;
    margin-bottom:20px;
    background: linear-gradient(135deg, rgba(46,189,229,0.15), rgba(26,63,196,0.10));
    border:1px solid rgba(26,63,196,0.12);
  }

  .card h2 {
    font-family:'Sora', sans-serif;
    font-size:1.35rem;
    font-weight:700;
    color:var(--azul-oscuro);
    line-height:1.35;
    margin-bottom:8px;
  }

  .card .subtitle {
    font-size:0.9rem;
    color:#6B7280;
    line-height:1.6;
    margin-bottom:28px;
  }

  /* ── Inputs ── */
  input[type="text"],
  textarea {
    width:100%;
    padding:14px 18px;
    border:2px solid rgba(26,63,196,0.15);
    border-radius:14px;
    font-family:'DM Sans', sans-serif;
    font-size:0.95rem;
    color:var(--gris-texto);
    background:#FAFBFF;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline:none;
  }

  input[type="text"]:focus,
  textarea:focus {
    border-color:var(--azul-cielo);
    box-shadow:0 0 0 4px rgba(46,189,229,0.12);
    background:var(--blanco);
  }

  textarea {
    resize:vertical;
    min-height:110px;
  }

  /* ── Escala likert ── */
  .scale-labels {
    display:flex;
    justify-content:space-between;
    font-size:0.75rem;
    color:#9CA3AF;
    margin-bottom:10px;
    font-weight:500;
  }

  .scale-options {
    display:flex;
    gap:8px;
  }

  .scale-options label {
    flex:1;
    cursor:pointer;
  }

  .scale-options input[type="radio"] {
    display:none;
  }

  .scale-options .scale-btn {
    display:flex;
    align-items:center;
    justify-content:center;
    height:52px;
    border-radius:12px;
    border:2px solid rgba(26,63,196,0.15);
    background:#FAFBFF;
    font-family:'Sora', sans-serif;
    font-weight:700;
    font-size:1rem;
    color:#9CA3AF;
    transition: all 0.18s;
  }

  .scale-options label:hover .scale-btn {
    border-color:var(--azul-cielo);
    color:var(--azul-cielo);
    background:rgba(46,189,229,0.06);
    transform:translateY(-2px);
  }

  .scale-options input[type="radio"]:checked + .scale-btn {
    background:linear-gradient(135deg,var(--azul-profundo),var(--azul-cian));
    border-color:transparent;
    color:var(--blanco);
    box-shadow:0 4px 14px rgba(26,63,196,0.3);
    transform:translateY(-3px);
  }

  /* ── Opciones múltiple choice ── */
  .choice-group {
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  .choice-group label {
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:14px;
    padding:14px 18px;
    border-radius:14px;
    border:2px solid rgba(26,63,196,0.12);
    background:#FAFBFF;
    transition: all 0.18s;
    font-size:0.93rem;
    color:var(--gris-texto);
  }

  .choice-group label:hover {
    border-color:var(--azul-cielo);
    background:rgba(46,189,229,0.06);
  }

  .choice-group input[type="radio"] {
    display:none;
  }

  .choice-group .radio-dot {
    width:20px; height:20px;
    border-radius:50%;
    border:2px solid rgba(26,63,196,0.25);
    flex-shrink:0;
    position:relative;
    transition:all 0.18s;
  }

  .choice-group input[type="radio"]:checked ~ .choice-group label,
  .choice-group label:has(input[type="radio"]:checked) {
    border-color:var(--azul-profundo);
    background:rgba(26,63,196,0.05);
  }

  .choice-group label:has(input[type="radio"]:checked) .radio-dot {
    background:var(--azul-profundo);
    border-color:var(--azul-profundo);
    box-shadow:0 0 0 3px rgba(26,63,196,0.15);
  }

  .choice-group label:has(input[type="radio"]:checked) .radio-dot::after {
    content:'';
    position:absolute;
    top:50%;left:50%;
    transform:translate(-50%,-50%);
    width:8px;height:8px;
    background:white;
    border-radius:50%;
  }

  /* ── Frecuencia (chips) ── */
  .chip-group {
    display:flex;
    flex-wrap:wrap;
    gap:10px;
  }

  .chip-group label {
    cursor:pointer;
  }

  .chip-group input[type="radio"] { display:none; }

  .chip-btn {
    padding:10px 20px;
    border-radius:50px;
    border:2px solid rgba(26,63,196,0.15);
    background:#FAFBFF;
    font-family:'DM Sans', sans-serif;
    font-size:0.88rem;
    color:var(--gris-texto);
    font-weight:500;
    transition:all 0.18s;
    display:inline-block;
  }

  .chip-group label:hover .chip-btn {
    border-color:var(--azul-cielo);
    color:var(--azul-cielo);
  }

  .chip-group input[type="radio"]:checked + .chip-btn {
    background:var(--azul-profundo);
    border-color:var(--azul-profundo);
    color:white;
    box-shadow:0 3px 12px rgba(26,63,196,0.25);
  }

  /* ── Navegación ── */
  .nav-buttons {
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:36px;
    gap:12px;
  }

  .btn-back {
    padding:13px 26px;
    border-radius:12px;
    border:2px solid rgba(26,63,196,0.2);
    background:transparent;
    color:var(--azul-profundo);
    font-family:'Sora', sans-serif;
    font-weight:600;
    font-size:0.9rem;
    cursor:pointer;
    transition:all 0.18s;
  }

  .btn-back:hover {
    background:rgba(26,63,196,0.06);
    border-color:var(--azul-profundo);
  }

  .btn-next {
    padding:14px 36px;
    border-radius:12px;
    border:none;
    background:linear-gradient(135deg, var(--azul-profundo), var(--azul-cian));
    color:white;
    font-family:'Sora', sans-serif;
    font-weight:700;
    font-size:0.95rem;
    cursor:pointer;
    transition:all 0.22s;
    box-shadow:0 4px 18px rgba(26,63,196,0.3);
    display:flex;
    align-items:center;
    gap:8px;
    margin-left:auto;
  }

  .btn-next:hover {
    transform:translateY(-2px);
    box-shadow:0 6px 24px rgba(26,63,196,0.4);
  }

  .btn-next:active {
    transform:translateY(0);
  }

  .btn-submit {
    background:linear-gradient(135deg, #059669, #10B981);
    box-shadow:0 4px 18px rgba(5,150,105,0.3);
  }

  .btn-submit:hover {
    box-shadow:0 6px 24px rgba(5,150,105,0.45);
  }

  /* ── Bienvenida ── */
  .welcome-hero {
    text-align:center;
    padding:12px 0 8px;
  }

  .welcome-hero .faro-big {
    width:80px;
    margin:0 auto 20px;
    display:block;
    filter:drop-shadow(0 4px 16px rgba(26,63,196,0.2));
    animation: floatLogo 3s ease-in-out infinite;
  }

  @keyframes floatLogo {
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-6px);}
  }

  .welcome-hero h2 {
    font-family:'Sora',sans-serif;
    font-size:1.7rem;
    font-weight:800;
    color:var(--azul-oscuro);
    line-height:1.25;
    margin-bottom:14px;
  }

  .welcome-hero h2 span {
    color:var(--azul-cielo);
  }

  .welcome-hero p {
    font-size:0.95rem;
    color:#6B7280;
    line-height:1.7;
    max-width:480px;
    margin:0 auto 8px;
  }

  .privacy-note {
    margin-top:18px;
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:rgba(16,185,129,0.08);
    border:1px solid rgba(16,185,129,0.2);
    border-radius:8px;
    padding:8px 14px;
    font-size:0.8rem;
    color:#059669;
    font-weight:500;
  }

  /* ── Pantalla final ── */
  .final-card {
    text-align:center;
  }

  .final-card .check-circle {
    width:80px; height:80px;
    background:linear-gradient(135deg,#059669,#10B981);
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:0 auto 24px;
    font-size:2rem;
    box-shadow:0 8px 30px rgba(5,150,105,0.3);
    animation:popIn 0.5s cubic-bezier(0.175,0.885,0.32,1.275) both;
  }

  @keyframes popIn {
    from{transform:scale(0); opacity:0;}
    to{transform:scale(1); opacity:1;}
  }

  .final-card h2 {
    font-family:'Sora',sans-serif;
    font-size:1.6rem;
    font-weight:800;
    color:var(--azul-oscuro);
    margin-bottom:12px;
  }

  .final-card p {
    color:#6B7280;
    line-height:1.7;
    font-size:0.93rem;
    max-width:420px;
    margin:0 auto;
  }

  /* ── Mensaje error ── */
  .error-msg {
    display:none;
    color:#DC2626;
    font-size:0.8rem;
    margin-top:6px;
    align-items:center;
    gap:4px;
  }

  .error-msg.show { display:flex; }

  /* ── Responsive ── */
  @media(max-width:600px){
    header { padding:20px; }
    header .badge { display:none; }
    main { padding:24px 16px 48px; }
    .card { padding:28px 24px; }
    .scale-options .scale-btn { height:44px; font-size:0.9rem; }
  }
</style>
</head>

  const progressFill = document.getElementById("progressFill");
  const stepLabel = document.getElementById("stepLabel");
  const stepCount = document.getElementById("stepCount");

  const pct = ((index + 1) / totalSteps) * 100;
  progressFill.style.width = pct + "%";

  if (index === 0) {
    stepLabel.textContent = "Inicio";
    stepCount.textContent = "";
  } else if (index === totalSteps - 1) {
    stepLabel.textContent = step.label || "Último paso";
    stepCount.textContent = `Paso ${index} de ${totalSteps - 1}`;
  } else {
    stepLabel.textContent = step.label || "";
    stepCount.textContent = `Paso ${index} de ${totalSteps - 1}`;
  }

  let html = "";

  if (step.type === "welcome") {
    html = `
      ${step.render()}
      <div class="nav-buttons">
        <button class="btn-next" onclick="nextStep()">Empezar la encuesta →</button>
      </div>
    `;
  } else if (step.type === "text") {
    html = `
      <div class="card-icon">${step.icon}</div>
      <h2>${step.question}</h2>
      <p class="subtitle">${step.subtitle}</p>
      <input type="text" id="inputField"
        placeholder="${step.placeholder}"
        value="${answers[step.id] || ""}"
        oninput="answers['${step.id}'] = this.value">
      <div class="error-msg" id="errorMsg">⚠️ Este campo es requerido.</div>
      <div class="nav-buttons">
        <button class="btn-back" onclick="prevStep()">← Atrás</button>
        <button class="btn-next" onclick="nextStep()">Siguiente →</button>
      </div>
    `;
  } else if (step.type === "scale") {
    const val = answers[step.id] || null;
    let btns = "";
    for (let i = 1; i <= 5; i++) {
      btns += `
        <label>
          <input type="radio" name="scaleQ" value="${i}" ${val == i ? "checked" : ""}
            onchange="answers['${step.id}'] = this.value; document.getElementById('errorMsg').classList.remove('show')">
          <div class="scale-btn">${i}</div>
        </label>`;
    }
    html = `
      <div class="card-icon">${step.icon}</div>
      <h2>${step.question}</h2>
      <p class="subtitle">${step.subtitle}</p>
      <div class="scale-labels"><span>${step.min}</span><span>${step.max}</span></div>
      <div class="scale-options">${btns}</div>
      <div class="error-msg" id="errorMsg">⚠️ Por favor seleccioná una opción.</div>
      <div class="nav-buttons">
        <button class="btn-back" onclick="prevStep()">← Atrás</button>
        <button class="btn-next" onclick="nextStep()">Siguiente →</button>
      </div>
    `;
  } else if (step.type === "choice") {
    const val = answers[step.id] || null;
    let opts = step.options.map(o => `
      <label>
        <input type="radio" name="choiceQ" value="${o.value}" ${val === o.value ? "checked" : ""}
          onchange="answers['${step.id}'] = this.value; document.getElementById('errorMsg').classList.remove('show')">
        <div class="radio-dot"></div>
        ${o.text}
      </label>`).join("");
    html = `
      <div class="card-icon">${step.icon}</div>
      <h2>${step.question}</h2>
      <p class="subtitle">${step.subtitle}</p>
      <div class="choice-group">${opts}</div>
      <div class="error-msg" id="errorMsg">⚠️ Por favor seleccioná una opción.</div>
      <div class="nav-buttons">
        <button class="btn-back" onclick="prevStep()">← Atrás</button>
        <button class="btn-next" onclick="nextStep()">Siguiente →</button>
      </div>
    `;
  } else if (step.type === "chips") {
    const val = answers[step.id] || null;
    let chips = step.options.map(o => `
      <label>
        <input type="radio" name="chipsQ" value="${o.value}" ${val === o.value ? "checked" : ""}
          onchange="answers['${step.id}'] = this.value; document.getElementById('errorMsg').classList.remove('show')">
        <span class="chip-btn">${o.text}</span>
      </label>`).join("");
    html = `
      <div class="card-icon">${step.icon}</div>
      <h2>${step.question}</h2>
      <p class="subtitle">${step.subtitle}</p>
      <div class="chip-group">${chips}</div>
      <div class="error-msg" id="errorMsg">⚠️ Por favor seleccioná una opción.</div>
      <div class="nav-buttons">
        <button class="btn-back" onclick="prevStep()">← Atrás</button>
        <button class="btn-next" onclick="nextStep()">Siguiente →</button>
      </div>
    `;
  } else if (step.type === "textarea") {
    html = `
      <div class="card-icon">${step.icon}</div>
      <h2>${step.question}</h2>
      <p class="subtitle">${step.subtitle}</p>
      <textarea id="inputField" placeholder="${step.placeholder}"
        oninput="answers['${step.id}'] = this.value">${answers[step.id] || ""}</textarea>
      <div class="error-msg" id="errorMsg">⚠️ Este campo es requerido.</div>
      <div class="nav-buttons">
        <button class="btn-back" onclick="prevStep()">← Atrás</button>
        <button class="btn-next btn-submit" onclick="submitSurvey()">✅ Enviar respuestas</button>
      </div>
    `;
  }

  card.style.animation = "none";
  card.offsetHeight; // reflow
  card.style.animation = "";
  card.innerHTML = html;
}

function validate(index) {
  const step = steps[index];
  if (!step.required) return true;

  if (step.type === "text") {
    const v = answers[step.id] || "";
    return v.trim().length > 0;
  }
  if (step.type === "scale" || step.type === "choice" || step.type === "chips") {
    return !!answers[step.id];
  }
  return true;
}

function nextStep() {
  if (currentStep > 0 && !validate(currentStep)) {
    const err = document.getElementById("errorMsg");
    if (err) err.classList.add("show");
    return;
  }
  currentStep++;
  if (currentStep < totalSteps) renderStep(currentStep);
}

function prevStep() {
  if (currentStep > 0) { currentStep--; renderStep(currentStep); }
}

async function submitSurvey() {

  // ── 1. Guardar el último campo (textarea del mensaje) ─────
  const inputField = document.getElementById("inputField");
  if (inputField) {
    answers["mensaje"] = inputField.value;
  }

  // ── 2. Mostrar pantalla de éxito inmediatamente (mejor UX) ─
  showFinal();

  // ── 3. URL de tu Google Apps Script ───────────────────────
  //       Pegá tu enlace /exec entre las comillas de abajo
  const url = 'TU_URL_DE_GOOGLE_AQUI'; // <--- REEMPLAZÁ ESTO

  // ── 4. Armar los datos — nombres exactos que recibe el Script
  const datos = {
    nombre:        answers["nombre"]        || "Anónimo",
    pertenencia:   answers["pertenencia"]   || "",
    apoyo:         answers["apoyo"]         || "",
    motivacion:    answers["motivacion"]    || "",
    redes_horas:   answers["redes_horas"]   || "",
    redes_impacto: answers["redes_impacto"] || "",
    mensaje:       answers["mensaje"]       || ""
  };

  // ── 5. Enviar a Google Sheets ──────────────────────────────
  fetch(url, {
    method: 'POST',
    mode: 'no-cors',    // Necesario para Google Apps Script
    cache: 'no-cache',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(datos)
  })
  .then(() => {
    // Con mode: no-cors no podemos leer la respuesta, pero llegó bien
    console.log('✅ Datos enviados a Google Sheets:', datos);
  })
  .catch(error => {
    // Solo se activa si hay un problema de red
    console.error('❌ Error al enviar:', error);
  });
}

function showFinal() {
  const nombre = answers["nombre"] ? `, ${answers["nombre"]}` : "";
  document.getElementById("progressArea").innerHTML = "";
  document.getElementById("surveyCard").innerHTML = `
    <div class="final-card">
      <div class="check-circle">✅</div>
      <h2>¡Gracias${nombre}!</h2>
      <p>Tu respuesta fue registrada. Este Observatorio existe gracias a que te animaste a compartir cómo estás.</p>
      <p style="margin-top:14px;">Los datos se analizarán de forma grupal para que podamos entender mejor nuestra realidad como curso y tomar acción desde la Educación STEAM.</p>
      <div style="margin-top:28px; padding:16px; background:rgba(26,63,196,0.05); border-radius:14px; border:1px solid rgba(26,63,196,0.12);">
        <p style="font-size:0.82rem; color:var(--azul-profundo); font-weight:600;">🔒 Recordá: esta encuesta es anónima. Nadie puede saber que fuiste vos.</p>
      </div>
    </div>
  `;
  document.getElementById("surveyCard").style.animation = "none";
  document.getElementById("surveyCard").offsetHeight;
  document.getElementById("surveyCard").style.animation = "";
}

// Arrancar
renderStep(0);
</script>

</html>
